- type: entity
  parent: Paper
  id: NCRecipePaperBase
  abstract: true
  name: технический рецепт
  description: Лист технической бумаги с закодированными инструкциями по сборке.
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: true
  - type: Paper
    content: "ИНСТРУКЦИЯ ПО СБОРКЕ: [ДАННЫЕ ПОВРЕЖДЕНЫ]\n\nНа этой бумаге можно писать дополнительные заметки."

