# ============================
# Модули Дробовиков (Shotguns)
# ============================

# Сваха (Tier 1)
- type: entity
  id: NCBlueprintSvakha
  name: модуль "Сваха"
  description: Диск с инструкциями по сборке и физический каркас под детали для дробовика Сваха.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/blueprint.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponShotgunSvakha
      garbageEntity: Wrench
      steps:
        - part: Frame
          prototype: NCProcessedFrameT1
          doAfterTime: 2.0
        - part: Barrel
          prototype: NCProcessedBarrelT1
          doAfterTime: 2.5
        - tool: Screwing
          doAfterTime: 3.5
        - part: Internals
          prototype: NCProcessedInternalsT1
          doAfterTime: 3.0
        - tool: Screwing
          doAfterTime: 2.5

- type: entity
  id: NCBlueprintMilitechCrusher
  name: модуль "Militech Crusher"
  description: Диск с инструкциями по сборке и физический каркас под детали для автоматического дробовика Militech Crusher. Т2.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/blueprint.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponShotgunMilitechCrusher
      garbageEntity: Wrench
      steps:
        - part: Frame
          prototype: NCProcessedFrameT2
          doAfterTime: 3.0
        - part: Barrel
          prototype: NCProcessedBarrelT2
          doAfterTime: 3.5
        - tool: Screwing
          doAfterTime: 4.0
        - part: Internals
          prototype: NCProcessedInternalsT2
          doAfterTime: 4.5
        - part: Board
          prototype: NCProcessedElectronicsT2
          doAfterTime: 3.0
        - tool: Pulsing
          doAfterTime: 4.0
