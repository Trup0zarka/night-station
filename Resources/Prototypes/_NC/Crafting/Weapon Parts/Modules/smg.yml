# Arasaka TKI20 Shingen (Tier 3)
- type: entity
  id: NCBlueprintShingen
  name: модуль "Arasaka TKI20 Shingen"
  description: Диск с инструкциями по сборке и физический каркас под детали для ПП Arasaka TKI20 Shingen. Т3.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/blueprint.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponSubMachineGunArasakaShingenEmpty
      garbageEntity: Wrench
      steps:
        - part: Frame
          prototype: NCProcessedFrameT3
          doAfterTime: 2.5
        - part: Barrel
          prototype: NCProcessedBarrelT3
          doAfterTime: 2.5
        - tool: Screwing
          doAfterTime: 3.5
        - part: Internals
          prototype: NCProcessedInternalsT3
          doAfterTime: 3.0
        - part: Board
          prototype: NCProcessedElectronicsT3
          doAfterTime: 2.5
        - tool: Pulsing
          doAfterTime: 4.0

