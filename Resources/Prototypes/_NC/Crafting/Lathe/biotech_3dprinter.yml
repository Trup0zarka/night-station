- type: entity
  id: NC3dPrinterBiotechnica
  parent: [BaseLatheLube, BaseMaterialSiloUtilizer]
  name: 3д принтер Биотехники
  description: Конвертирует сырье в продвинутые предметы.
  components:
  - type: Sprite
    sprite: _NC/Structures/Machines/biotech_protolathe.rsi
    snapCardinals: true
    layers:
    - state: biotech_icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: biotech_unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: biotech_panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: ProtolatheMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
      - Wooden
      - ClothMade
      - Gauze
      - Metal
  - type: Lathe
    idleState: biotech_icon
    runningState: biotech_building
    unlitIdleState: biotech_unlit
    unlitRunningState: biotech_unlit-building
    staticPacks:
    - NCDebugAll
    dynamicPacks:
    - AdvancedTools

