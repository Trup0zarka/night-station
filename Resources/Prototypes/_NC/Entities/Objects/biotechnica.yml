- type: entity
  parent: [BaseCrowbar, BiotechnicaContraband]
  id: BiotechnicaCrowbar
  name: монтировка
  description: Карманная корпоративная монтировка для разборки вещей и вскрытия заклинивших механизмов.
  suffix: Biotechnica, Тех
  components:
  - type: Sprite
    sprite: Objects/Tools/crowbar.rsi
    layers:
    - state: icon
    - state: cover-icon
      color: "#e6d600"
  - type: Item
    sprite: Objects/Tools/crowbar.rsi
    storedSprite:
      state: yellow-storage
      sprite: Objects/Tools/crowbar.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: cover-inhand-left
        color: "#e6d600"
      right:
      - state: inhand-right
      - state: cover-inhand-right
        color: "#e6d600"
  - type: Clothing
    sprite: Objects/Tools/crowbar.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
      - state: cover-equipped-BELT
        color: "#e6d600"

