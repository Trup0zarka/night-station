# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCDrinkBottleSpawner
  name: случайный напиток
  description: Спавнер случайного напитка.
  suffix: бутылка
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - NCDrinkBottle
    # Juices
    - NCDrinkBottleBluemax
    - NCDrinkBottleMultifruit
    - NCDrinkBottleLemonLimeStill
    - NCDrinkBottlePineapple
    - NCDrinkBottleBluePumpkin
    - NCDrinkBottlePoison
    - DrinkWaterBottleFull
    - DrinkSodaWaterBottleFull
    - DrinkTonicWaterBottleFull
    # Sodas
    - NCDrinkBottleSupermax
    chance: 0.8
    rarePrototypes:
    # Juices
    - NCDrinkBottlePumpkin
    - DrinkColaBottleFull
    - DrinkGrenadineBottleFull
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/bottles.rsi
    state: icon

