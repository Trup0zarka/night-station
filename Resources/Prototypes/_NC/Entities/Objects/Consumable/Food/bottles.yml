# region Abstract

- type: entity
  parent: [DrinkBottleVisualsOpenable, DrinkBottleGlassBaseFull]
  id: NCDrinkBottle
  name: бутылка
  description: Надеюсь внутри нет микропластмассы.
  suffix: бутылка
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 100
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/bottles.rsi
    layers:
      - state: icon
        map: ["enum.OpenableVisuals.Layer"]
      - state: fill-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: fill-

# region Juices

- type: entity
  parent: NCDrinkBottle
