# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCCondimentBottleSpawner
  name: случайная приправа
  description: Спавнер случайной приправы.
  suffix: бутылка ингредиента
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - NCCondimentBottle
    # Condiments
    - NCCondimentBottleKetchup
    - NCCondimentBottleBbqSauce
    - NCCondimentBottleHotSauce
    - NCCondimentBottleKetchunaise
    - NCCondimentBottleMayo
    - NCCondimentBottleMustard
    - NCCondimentBottleSoySauce
    - NCCondimentBottlePesto
    - NCCondimentBottleBechamel
    - NCCondimentBottleTomatoSauce
    # Ingredients
    - NCCondimentBottleEnzyme
    - NCCondimentBottleVinegar
    - NCCondimentBottleVinaigrette
    - NCCondimentBottleHorseradishSauce
    - NCCondimentBottleSyrup
    - NCCondimentBottleBlackpepper
    - NCCondimentBottleTonic
    - NCCondimentBottleGrenadine
    - NCCondimentBottleTeaPowder
    # Oils
    - NCCondimentBottleOil
    - NCCondimentBottleOilOlive
    - NCCondimentBottleCapsaicinOil
    - NCCondimentBottleFrostOil
    - NCCondimentBottleCornOil
    - NCCondimentBottleOilRefined
    chance: 0.8
    rarePrototypes:
    # Mixes
    - NCCondimentBottleExoticBitter
    - NCCondimentBottleTeriyaki
    - NCCondimentBottleVodkaSauce
    # Special condiments
    - NCCondimentBottleAstro
    - NCCondimentBottleLaughinSyrup
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: Objects/Consumable/Food/condiments.rsi
    state: bottle-empty

