# region Abstract

- type: entity
  parent: BaseFoodCondimentBottle
  id: NCCondimentBottle
  name: бутылка для приправы
  description: Идеально для готовки.
  suffix: бутылка ингредиента
  components:
  - type: Sprite
    layers:
    - state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - state: label-c
    - state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Icon
    state: bottle-coldsauce
  - type: Tag
    tags:
      - DrinkBottle

