# region Abstract

- type: entity
  parent: DrinkBaseCup
  id: NCDrinkCup
  name: кружка
  description: Тёмная прочная кружка.
  suffix: кружка
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 20
  - type: Icon
    sprite: _NC/Objects/Consumable/Food/Vending/cups.rsi
    state: icon-vend
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/cups.rsi
    layers:
      - state: icon-0
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: icon-4
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: icon-
  - type: TrashOnSolutionEmpty
    solution: drink

