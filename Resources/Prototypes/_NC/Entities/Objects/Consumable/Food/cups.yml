# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCDrinkCupSpawner
  name: случайный напиток
  description: Спавнер случайного напитка.
  suffix: кружка
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - NCDrinkCup
    # Soups
    - NCDrinkEggCooked
    - NCDrinkHotRamen
    # Drinks
    - NCDrinkLatte
    - NCDrinkHotCocoa
    - NCDrinkCoffee
    - NCDrinkTea
    - NCDrinkGreenTea
    - NCDrinkSoyLatte
    - NCDrinkCreamOfCoconut
    - NCDrinkCream
    - NCDrinkMilkChoco
    - NCDrinkCreamCoffee
    chance: 0.8
    rarePrototypes:
    # Soups
    - NCDrinkMisoSoup
    - NCDrinkTomYamSoup
    - NCDrinkPumpkinSoup
    - NCDrinkGarlicSoup
    # Drinks
    - NCDrinkLean
    - NCDrinkPumpkinSpiceLatte
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/cups.rsi
    state: icon-vend

# region Vending Inventories

- type: vendingMachineInventory
  id: NCDrinkCupSoupMachineInventory
  startingInventory:
    NCDrinkEggCooked: 5
    NCDrinkHotRamen: 5
    NCDrinkMisoSoup: 5
    NCDrinkTomYamSoup: 5
    NCDrinkPumpkinSoup: 5
    NCDrinkGarlicSoup: 5
  startingItemPrices:
    NCDrinkEggCooked: 25
    NCDrinkHotRamen: 30
    NCDrinkMisoSoup: 25
    NCDrinkTomYamSoup: 28
    NCDrinkPumpkinSoup: 26
    NCDrinkGarlicSoup: 24

- type: entity
  parent: VendingMachineCoffee
  id: VendingMachineSoups
  name: Лучшие горячие супы НайтСити
  description: Подаются кипящими, чтобы оставались горячими весь день!
  components:
  - type: VendingMachine
    pack: NCDrinkCupSoupMachineInventory
  - type: Sprite
    noRot: true
    sprite: Structures/Machines/VendingMachines/soda.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
