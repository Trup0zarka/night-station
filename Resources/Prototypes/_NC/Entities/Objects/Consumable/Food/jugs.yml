# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCDrinkJugSpawner
  name: случайный напиток
  description: Спавнер случайного напитка.
  suffix: кувшин
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - CustomDrinkJug
    # Juices
    - NCDrinkJugAppleJuice
    - NCDrinkJugLemonJuice
    - DrinkSugarJug
    - DrinkLemonLimeJug
    - DrinkIceJug
    - DrinkCoconutWaterJug
    - DrinkCoffeeJug
    - DrinkTeaJug
    - DrinkGreenTeaJug
    - DrinkIcedTeaJug
    - DrinkWaterMelonJuiceJug
    - DrinkEnergyDrinkJug
    chance: 0.8
    rarePrototypes:
    # Juices
    - NCDrinkJugBluePumpkinJuice
    - NCDrinkJugBungoJuice
    - DrinkMeadJug
    - DrinkDrGibbJug
    - DrinkRootBeerJug
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: Objects/Consumable/Drinks/generic_jug.rsi
    state: icon

