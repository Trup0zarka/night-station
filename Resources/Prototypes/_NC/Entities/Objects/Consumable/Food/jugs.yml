# region Drinks

- type: entity
  parent: [DrinkBottleVisualsOpenable, DrinkBottlePlasticBaseFull]
  id: NCDrinkJugAppleJuice
  name: кувшин с яблочным соком
  description: Просто яблоки.
  suffix: кувшин
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 300
        reagents:
        - ReagentId: JuiceApple
          Quantity: 300
  - type: Drink
  - type: Label
    currentLabel: reagent-name-juice-apple

