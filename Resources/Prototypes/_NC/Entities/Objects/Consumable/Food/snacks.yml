# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCFoodSnackSpawnerWrapped
  name: случайный перекус в упаковке
  description: Спавнер случайного перекуса в упаковке.
  suffix: завернутый перекус
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    - FoodSnackTacoWrapped
    - FoodSnackBurritoWrapped
    - FoodSnackKhachapuriWrapped
    - FoodSnackShawarmaWrapped
    - FoodSnackCheeseburgerWrapped
    - FoodSnackBurgerWrapped
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi
    state: icon_sealed

- type: entity
  parent: MarkerBase
  id: NCFoodSnackSpawner
  name: случайный перекус
  description: Спавнер случайного перекуса.
  suffix: открытый перекус
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    - FoodSnackTaco
    - FoodSnackBurrito
    - FoodSnackKhachapuri
    - FoodSnackShawarma
    - FoodSnackCheeseburger
    - FoodSnackBurger
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi
    state: icon

- type: entity
  parent: MarkerBase
  id: NCFoodSnackSpawnerTrash
  name: случайная упаковка от перекуса
  description: Спавнер случайной упаковки от перекуса.
  suffix: оболочка от перекуса
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    - FoodSnackTacoTrash
    - FoodSnackBurritoTrash
    - FoodSnackKhachapuriTrash
    - FoodSnackShawarmaTrash
    - FoodSnackCheeseburgerTrash
    - FoodSnackBurgerTrash
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi
    state: icon_empty

