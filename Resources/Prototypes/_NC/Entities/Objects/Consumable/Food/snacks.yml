# region Abstract

- type: entity
  parent: BaseItem
  id: NCBaseFoodSnackWrapped
  abstract: true
  suffix: завернутый перекус
  components:
  - type: Sprite
    state: icon_sealed
  - type: Tag
    tags:
      - FoodSnack
  - type: SpawnItemsOnUse
    items:
      - id: NCBaseFoodSnackTrash
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: [FoodSnackBase, FoodInjectableBase]
  id: NCBaseFoodSnack
  abstract: true
  suffix: открытый перекус
  components:
  - type: Sprite
    state: icon
  - type: Food
    transferAmount: 3
  - type: Tag
    tags:
      - FoodSnack

- type: entity
  parent: FoodPacketTrash
  id: NCBaseFoodSnackTrash
  abstract: true
  suffix: оболочка от перекуса
  components:
  - type: Sprite
    state: icon_empty

# region Taco

- type: entity
  parent: NCBaseFoodSnackWrapped
  id: FoodSnackTacoWrapped
  name: тако
  description: Дешевый тако в упаковке с прикрепленным соусом для вкуса.
  components:
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi
  - type: SpawnItemsOnUse
    items:
      - id: FoodSnackTacoTrash
      - id: NCCondimentPacketKetchup
      - id: FoodSnackTaco

- type: entity
  parent: NCBaseFoodSnack
  id: FoodSnackTaco
  name: тако
  description: Простой бобовый тако.
  components:
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 10

- type: entity
  parent: NCBaseFoodSnackTrash
  id: FoodSnackTacoTrash
  name: упаковка от тако
  description: Оболочка от тако.
  components:
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/taco.rsi

