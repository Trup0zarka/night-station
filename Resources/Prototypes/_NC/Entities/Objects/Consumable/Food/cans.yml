# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCDrinkCanSpawner
  name: случайный напиток
  description: Спавнер случайного напитка.
  suffix: баночка
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - NCDrinkCan
    # Biotechnica - Unhealthy drinks
    - NCDrinkCanBiotechnicaMultifruitFake
    - NCDrinkCanBiotechnicaTeaFake
    - NCDrinkCanBiotechnicaTonicMutagen
    # Biotechnica - Neutral drinks
    - NCDrinkCanBiotechnica
    - NCDrinkCanBiotechnicaRespawn
    - NCDrinkCanBiotechnicaTonicFake
    # Cola
    - NCDrinkCanCola
    - NCDrinkCanClassicCola
    - NCDrinkCanSweetCola
    - NCDrinkCanBerryCola
    - NCDrinkCanRipperCola
    - NCDrinkCanSoda
    - NCDrinkCanSodaAccelerate
    - NCDrinkCanAltCola
    # Cafe
    - NCDrinkCanLemonade
    - NCDrinkCanRootBeer
    - NCDrinkCanTonic
    - NCDrinkCanLemonLime
    - NCDrinkCanLemonLimeCranberry
    - NCDrinkCanOrangeLime
    # Cafe Premium
    - NCDrinkCanLemonadeSoda
    - NCDrinkCanCitrusSoda
    - NCDrinkCanGrapeSoda
    - NCDrinkCanGingerSoda
    - NCDrinkCanOrbitalAirCola
    - NCDrinkCanMountainDew
    # Cafe Iced
    - NCDrinkCanIcedTea
    - NCDrinkCanIcedGreenTea
    - NCDrinkCanIcedCoffee
    # Energy drinks
    - NCDrinkCanEnergy
    - NCDrinkCanEnergySugar
    - NCDrinkCanEnergyPlus
    chance: 0.8
    rarePrototypes:
    # Restaurant
    - NCDrinkCanOrangeSoda
    - NCDrinkCanGrenadineSoda
    # Energy drinks
    - NCDrinkCanEnergyMax
    - NCDrinkCanEnergyInsane
    # Biotechnica - Healthy drinks
    - NCDrinkCanBiotechnicaBerry
    - NCDrinkCanBiotechnicaCherry
    - NCDrinkCanBiotechnicaBluePumpkin
    - NCDrinkCanBiotechnicaMultifruit
    # Biotechnica - Super healthy drinks
    - NCDrinkCanBiotechnicaVitamins
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/cans.rsi
    state: icon

