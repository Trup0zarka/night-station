# region Abstract

- type: entity
  parent: DrinkCanBaseFull
  id: NCDrinkCan
  name: баночка
  description: Пустая алюминиевая баночка.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Item
    sprite: _NC/Objects/Consumable/Food/Vending/cans.rsi
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/cans.rsi
    state: icon
    layers:
      - state: icon
        map: ["enum.OpenableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon_open"}
          False: {state: "icon"}
  - type: PhysicalComposition
    materialComposition:
      Aluminum: 50

# region Biotechnica - Unhealthy drinks

# Cheapest options out there - very easy to make,
# will harm you if drank too much.

- type: entity
  parent: NCDrinkCan
  id: NCDrinkCanBiotechnicaMultifruitFake
  name: напиток Мультифруктовый Бум
  description: Вкусные фрукты в баночке, с кислинкой!
  suffix: баночка, Поддельный
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Water
          Quantity: 22
        - ReagentId: FerrochromicAcid
          Quantity: 2
        - ReagentId: Sugar
          Quantity: 6
  - type: Sprite
    layers:
      - state: icon
        map: ["enum.OpenableVisuals.Layer"]
      - state: multifruit
  - type: StaticPrice
    price: 12

- type: entity
