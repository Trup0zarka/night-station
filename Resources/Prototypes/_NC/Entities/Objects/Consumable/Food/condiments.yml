# region Abstract

- type: entity
  parent: BaseFoodCondiment
  id: NCCondimentPacket
  name: пакетик для соуса
  description: Маленький пакетик с соусом для добавления в еду.
  suffix: пакетик с соусом
  components:
  - type: Item
    size: Tiny
  - type: Drink
    solution: food
  - type: Openable
    sound:
      collection: packetOpenSounds
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
  - type: SolutionTransfer
    maxTransferAmount: 10
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/condiments.rsi
    layers:
      - state: packet-layer
        map: ["enum.OpenableVisuals.Layer"]
      - state: packet-trans-2
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: true
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "packet-layer-open"}
          False: {state: "packet-layer"}
  - type: Icon
    sprite: _NC/Objects/Consumable/Food/Vending/condiments.rsi
    state: packet-empty
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food
  - type: DrainableSolution
    solution: food
  - type: TrashOnSolutionEmpty
    solution: food
  - type: StaticPrice
    price: 0
  - type: Tag
    tags:
      - Packet

