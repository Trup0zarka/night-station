# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCCondimentPacketSpawner
  name: случайная приправа
  description: Спавнер случайной приправы.
  suffix: пакетик с соусом
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Empty
    - NCCondimentPacket
    # Condiments
    - NCCondimentPacketKetchup
    - NCCondimentPacketHotKetchup
    - NCCondimentPacketBbqSauce
    - NCCondimentPacketCornoil
    - NCCondimentPacketHorseradishSauce
    - NCCondimentPacketVasabi
    - NCCondimentPacketHotSauce
    - NCCondimentPacketKetchunaise
    - NCCondimentPacketMayo
    - NCCondimentPacketMustard
    - NCCondimentPacketVinaigrette
    - NCCondimentPacketSoySauce
    - NCCondimentPacketSyrup
    - NCCondimentPacketGarlic
    - NCCondimentPacketSourGreenSauce
    - NCCondimentPacketHollandaise
    - NCCondimentPacketTomatoSauce
    - NCCondimentPacketTomatoDressing
    - NCCondimentPacketPesto
    - NCCondimentPacketBechamel
    - NCCondimentPacketMustardSauce
    chance: 0.8
    rarePrototypes:
    - NCCondimentPacketCarrot
    - NCCondimentPacketTartarSauce
    - NCCondimentPacketBananaSauce
    - NCCondimentPacketCherryJam
    - NCCondimentPacketBerryJam
    - NCCondimentPacketAppleJam
    - NCCondimentPacketOrangeJam
    - NCCondimentPacketSatsibili
    - NCCondimentPacketCheeseSauce
    - NCCondimentPacketCarbonaraSauce
    - NCCondimentPacketSweetChili
    - NCCondimentPacketBurgerSauce
    - NCCondimentPacketGolfSauce
    - NCCondimentPacketVodkaSauce
    - NCCondimentPacketLasagnaSauce
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/condiments.rsi
    state: packet-empty
