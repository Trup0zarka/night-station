# region Alcoholic drinks

- type: entity
  parent: NCDrinkCan
  id: NCDrinkCanBeer
  name: пиво Бластер Светлое
  description: Светлое пиво Бластер. Пивнее некуда.
  suffix: баночка, алкоголь
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Beer
          Quantity: 30
  - type: Sprite
    layers:
      - state: icon
        map: ["enum.OpenableVisuals.Layer"]
      - state: text
  - type: StaticPrice
    price: 15
  - type: Tag
    tags:
    - DrinkCan
    - Beer

