# region Random Spawner

- type: entity
  parent: MarkerBase
  id: NCDrinkCanAlcoholSpawner
  name: случайный напиток
  description: Спавнер случайного напитка.
  suffix: баночка, алкоголь
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: RandomSpawner
    prototypes:
    # Good luck
    - NCDrinkCanBeer
    - NCDrinkCanNegativiePlus
    - NCDrinkCanNegativie
    - NCDrinkCanRumCola
    - NCDrinkCanRipperRefill
    - NCDrinkCanRustedPleasure
    # Alcoholic drinks
    - NCDrinkCanWine
    - NCDrinkCanBurningCorp
    - NCDrinkCanBlindHappiness
    - NCDrinkCanCubasNightmare
    - NCDrinkCanInnardsProsecco
    - NCDrinkCanChocowhirl
    - NCDrinkCanPatron
    - NCDrinkCanKonrev
    chance: 0.8
    rarePrototypes:
    # Alcoholic drinks
    - NCDrinkCanFourteenLoko
    - NCDrinkCanMojito
    rareChance: 0.1
    offset: 0.0
  - type: Sprite
    sprite: _NC/Objects/Consumable/Food/Vending/cans.rsi
    state: icon

