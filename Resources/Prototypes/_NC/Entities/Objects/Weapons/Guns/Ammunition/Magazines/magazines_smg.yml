- type: entity
  id: MagazinePistolSubMachineGunShingen
  name: магазин Arasaka TKI20 Shingen (11x20 CL)
  description: Удлинённый магазин для ПП Arasaka TKI20 Shingen. Вмещает 40 патронов калибра 9мм.
  parent: BaseMagazinePistolSubMachineGun
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 40
    proto: Cartridge11x20CL
    whitelist:
      tags:
      - Cartridge
      - Cartridge11x20CL
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/bullet_insert.ogg
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazinePistolSubMachineGunShingen

