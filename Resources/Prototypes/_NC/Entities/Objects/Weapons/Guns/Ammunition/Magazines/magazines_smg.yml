- type: entity
  id: MagazinePistolSubMachineGunShingen
  name: магазин Arasaka TKI20 Shingen (9мм)
  description: Удлинённый магазин для ПП Arasaka TKI20 Shingen. Вмещает 45 патронов калибра 9мм.
  parent: BaseMagazinePistolSubMachineGun
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 45
    proto: Cartridge9mm
    whitelist:
      tags:
      - Cartridge9mm
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/bullet_insert.ogg
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazinePistolSubMachineGunShingen

