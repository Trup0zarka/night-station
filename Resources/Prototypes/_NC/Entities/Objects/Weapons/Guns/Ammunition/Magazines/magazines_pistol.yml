  components:
  - type: Tag
    tags:
    - MagazinePistolHelloCutie
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: Cartridge9x19
    whitelist:
      tags:
      - Cartridge
      - Cartridge9x19
    capacity: 12
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/Pistol/hello_cutie.rsi
    layers:
    - state: hello-cutie
      map: ["enum.GunVisualLayers.Base"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Appearance

