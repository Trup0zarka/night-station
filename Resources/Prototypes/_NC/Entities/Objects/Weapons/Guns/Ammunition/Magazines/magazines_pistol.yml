- type: entity
  id: MagazinePistolStukach
  name: магазин Стукача Томми (11x20 CL)
  description: Вместительный магазин для тяжелого пистолета Стукач Томми. Заряжен убойными патронами 12.7мм. Вмещает 8 патронов.
  parent: BaseMagazinePistol
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 8
    proto: Cartridge11x20
    whitelist:
      tags:
      - Cartridge
      - Cartridge11x20
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazinePistolStukach

