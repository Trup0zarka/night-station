- type: entity
  name: Militech "Boomer Buster"
  parent: [BaseWeaponPistol, NCBrandMilitech]
  id: WeaponPistolBoomerBuster
  description: 'Тяжелый армейский пистолет с квадратным силуэтом, ценящийся за эталонную надежность Militech и пробивную мощь калибра .45 в любых условиях «Четвертой корпоративной».'
  components:
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/Pistol/Militech_Boomer_Buster/big.rsi
    scale: 0.6, 0.6
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _NC/Objects/Weapons/Guns/Pistol/Militech_Boomer_Buster/tiny.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolBoomerBuster
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolBoomerBuster
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge127mm
        priority: 1
        whitelist:
          tags:
            - Cartridge127mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
    fireOnDropChance: 0.3


# Пустой вариант для лута
- type: entity
  name: Militech "AVENGER"
  parent: WeaponPistolAvenger
  id: WeaponPistolAvengerEmpty
