- type: entity
  name: Arasaka TKI20 Shingen
  parent: [BaseWeaponSubMachineGun, NCBrandArasaka, BaseGunWieldable] # WD EDIT: BaseGunWieldable
  id: WeaponSubMachineGunArasakaShingen
  description: Manufactured by Cybersun-Armaments, the C-20r is one of the most popular personal small-arms in the Coalition of Colonies. Uses .35 auto ammo.
  components:
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/SMG/Arasaka_TKI20_Shingen.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _NC/Objects/Weapons/Guns/SMG/Arasaka_TKI20_Shingen.rsi
  # WD EDIT START
  - type: Wieldable
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -16
  # WD EDIT END
  - type: Gun
    # WD EDIT START
    minAngle: 21
    maxAngle: 32
    # WD EDIT END
    fireRate: 10
    shotsPerBurst: 5
    availableModes:
    - Burst
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
    fireOnDropChance: 0.3
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  # WD DIT START: Guns resize
  - type: Item
    shape:
    - 0,0,5,1
  # WD EDIT END
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunShingen
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistolSubMachineGunShingen
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19
        priority: 1
        whitelist:
          tags:
          - Cartridge9x19

- type: entity
  name: Arasaka TKI20 Shingen
  suffix: Empty
  parent: WeaponSubMachineGunArasakaShingen
  id: WeaponSubMachineGunArasakaShingenEmpty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistolSubMachineGunShingen
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - Cartridge9x19


