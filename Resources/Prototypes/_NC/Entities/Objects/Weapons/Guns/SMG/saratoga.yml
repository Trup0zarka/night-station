- type: entity
  name: Militech M221 Saratoga
  parent: [BaseWeaponSubMachineGun, NCBrandMilitech, BaseGunWieldable] # WD EDIT: BaseGunWieldable
  id: WeaponSubMachineGunMilitechSaratoga
  description: Manufactured by Militech, the M221 is one of the most popular personal small-arms in the New Coast. Uses .45 ACP ammo.
  components:
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/SMG/Militech_M221_Saratoga.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _NC/Objects/Weapons/Guns/SMG/Militech_M221_Saratoga.rsi
  # WD EDIT START
  - type: Wieldable
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -16
  # WD EDIT END
  - type: Gun
    # WD EDIT START
    minAngle: 21
    maxAngle: 32
    # WD EDIT END
    fireRate: 8
    shotsPerBurst: 5
    availableModes:
    - Burst
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
    fireOnDropChance: 0.3
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  # WD DIT START: Guns resize
  - type: Item
    shape:
    - 0,0,5,1
  # WD EDIT END
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunSaratoga
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistolSubMachineGunSaratoga
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9mm
        priority: 1
        whitelist:
          tags:
          - Cartridge9mm

