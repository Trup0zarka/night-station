- type: entity
  parent: BasePlushie
  id: PlushieExperiment  # Arf!
  name: плюшевый Чмоня
  description: Это чмоня, но этот не кусается.
  components:
  - type: Sprite
    sprite: _NC/Objects/Fun/Plushies/expi.rsi
    state: icon
  - type: Item
    sprite: _NC/Objects/Fun/Plushies/expi.rsi
    inhandVisuals:
      left:
      - state: inhand-left
        shader: shaded
      right:
      - state: inhand-right
        shader: shaded
  - type: EmitSoundOnUse
    sound: &PlushieExperimentSound
      path: /Audio/_NC/Items/Toys/arf.ogg
  - type: EmitSoundOnLand
    sound: *PlushieExperimentSound
  - type: EmitSoundOnActivate
    sound: *PlushieExperimentSound
  - type: EmitSoundOnTrigger
    sound: *PlushieExperimentSound
  - type: EmitSoundOnCollide
    sound: *PlushieExperimentSound
  - type: Food
    requiresSpecialDigestion: true
    useSound: *PlushieExperimentSound
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit: *PlushieExperimentSound
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        shader: shaded
    quickEquip: false
    sprite: _NC/Objects/Fun/Plushies/expi.rsi
    slots:
    - HEAD
  - type: Tag
    tags:
    - Payload
    - ClothMade
