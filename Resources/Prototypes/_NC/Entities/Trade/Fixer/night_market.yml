- type: entity
  parent: BaseItem
  id: NightMarket
  name: Ночной рынок
  description: Особое устройство фиксера для покупки редкого снаряжения.
  suffix: tablet, small
  components:
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: NcStoreStructuredBoundUi
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Sprite
    sprite: Objects/Devices/pda.rsi # Placeholder, maybe use a laptop sprite if available
    state: pda-bartender # Placeholder
    layers:
    - state: pda-bartender # Placeholder
  - type: NcStore
    buyPresets:
    - NightMarket_Buy
    contractPresets:
    - PresetFixer
  - type: AccessReader
    access: [["Fixer"]]

