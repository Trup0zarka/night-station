  description: "Местный оружейник просит принести сталь для ствольных заготовок. Без вопросов, чисто бизнес."
  difficulty: Easy
  targets:
  - id: SheetSteel
    required: { min: 10, max: 20 }
  rewards:
  - type: Currency
    id: Credit
    amount: { min: 80, max: 150 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: fixer_easy

- type: storeContract
  id: fixer_contract_JunkElectronics
