    id: Credit
    amount: { min: 6000, max: 9000 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: fixer_medium

- type: storeContract
  id: fixer_contract_MilitaryChrome
  name: "Военный Хром"
  description: "Анонимный клиент ищет боевые нейро-импланты через черный ход. Если достанешь Керензиков — озолотишься."
