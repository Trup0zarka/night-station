# --- Militech Variations ---

- type: entity
  name: Militech operative
  parent: BaseMobHuman
  id: MobNCMilitechLootable
  description: Опытный боец Militech, наёмник из частной армии корпорации.
  abstract: true
  IdleRange: !type:Single 10
  components:
  - type: NpcFactionMember
    factions:
    - NCMilitech
  - type: HTN
    rootTask:
      task: NCBanditTier3RootCompound
  - type: NPCAutoReload
