# region Abstract

- type: entity
  id: VendingMachineBiotechnica
  abstract: true
  components:
  - type: PointLight
    radius: 2
    energy: 1.6
    color: "#6facac"  # Biotechnica palette
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

- type: entity
  parent: BaseItem
  id: BaseVendingMachineRestockPartial
  abstract: true
  name: частичный набор пополнения торгового автомата
  description: Наполняет торговые автоматы определенными предметами.
  components:
  - type: VendingMachineRestockPartial
  - type: Sprite
    sprite: Objects/Specific/Service/vending_machine_restock.rsi
    layers:
    - state: base
    - state: green_bit
      shader: unshaded
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
    soundHit:
      path: /Audio/Weapons/genhit2.ogg
    soundSwing:
      path: /Audio/Weapons/punchmiss.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 11
    staminaCost: 15
  - type: Item
    size: Normal
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DumpRestockInventory
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

