- type: job
  id: TraumaTeamChief
  name: Главный врач Trauma Team
  description: 'Вы — тот самый человек, который конвертирует клятву Гиппократа в годовой отчет по прибыли. Ваша работа — следить, чтобы оперативники тратили патроны только на врагов, а плазму — только на тех, у кого в профиле горит "Платина". Вы не просто врач, вы — логистический кошмар, заставляющий смерть подождать, пока юристы проверяют страховку. Помните: если клиент умер — это трагедия, если он умер со страховкой "Бронза" — это просто статистика, а если с "Платиной" — это ваша последняя смена'
  playTimeTracker: JobTraumaTeamChief
  weight: 100
  salary: 650
  icon: "JobIconTraumaCMO"
  startingGear: TraumaTeamChiefGear
  access:
    - Trauma_Command
    - Trauma_Medical
    - Trauma_Morgue
    - Trauma_Hangar
    - Trauma_Operative
    - NC_General
  special:
  - !type:AddComponentSpecial
    components:
    - type: MapBeacon
      group: TraumaTeam
      color: "#4bdc99"
      icon: /Textures/_NC/Interface/Misc/job_icons.rsi/trauma-glava.png
      visibleInWorld: false
    - type: TraumaSubscriber
      tier: Platinum

- type: startingGear
  id: TraumaTeamChiefGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCMO
    back: ClothingBackpackSatchelMedical
    shoes: ClothingShoesColorWhite
    head: ClothingHeadHatBeretSeniorPhysician
    eyes: ClothingEyesGlassesCorpsman
    id: TraumaTeamChiefPDA
    belt: ClothingBeltMedicalFilled
    outerClothing: ClothingOuterCoatLabCmo
