# NC — CitiNet BBS каналы
# Гражданские текстовые каналы, маршрутизируемые через CitiNet Relay

- type: citiNetChannel
  id: CitiNetPublic
  name: citinet-bbs-channel-public
  color: "#cccccc"
  isAnonymous: true

- type: citiNetChannel
  id: Afterlife
  name: citinet-bbs-channel-afterlife
  color: "#9933ff"
  isHidden: true

# =========== NCPD ===========
# NCPD Dispatch — общий канал для патрульных и диспетчеров
- type: citiNetChannel
  id: NCPD_Dispatch
  name: citinet-bbs-channel-ncpd-dispatch
  color: "#2f5c9e"
  access:
    - NCPD_Patrol
    - Trauma_Medical
  isHidden: false

# NCPD Detectives — канал для расследований и детективов
- type: citiNetChannel
  id: NCPD_Detectives
  name: citinet-bbs-channel-ncpd-detectives
  color: "#1e3b66"
  access:
    - NCPD_Detective
  isHidden: false

# NCPD Command — связь командования департамента
- type: citiNetChannel
  id: NCPD_Command
  name: citinet-bbs-channel-ncpd-command
  color: "#4a8ced"
  access:
    - NCPD_Command
  isHidden: false

